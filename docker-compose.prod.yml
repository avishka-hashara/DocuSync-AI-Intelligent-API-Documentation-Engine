version: '3.8'

services:
  # 1. The Relational Database
  postgres:
    image: postgres:15-alpine
    container_name: docusync-postgres-prod
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: docusync
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  # 2. The Vector Database
  qdrant:
    image: qdrant/qdrant
    container_name: docusync-qdrant-prod
    ports:
      - "6333:6333"
    volumes:
      - qdrant_prod_data:/qdrant/storage

  # 3. The FastAPI Backend
  backend:
    build: ./backend
    container_name: docusync-backend-prod
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql://user:password@postgres:5432/docusync
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - qdrant

  # 4. The Next.js Frontend
  frontend:
    build: ./frontend
    container_name: docusync-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  qdrant_prod_data:
